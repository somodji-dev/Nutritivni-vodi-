    <meta http-equiv="Pragma" content="no-cache">
</head>
<body>
    <div id="app"></div>
    <script type="module" src="js/app.js?v=6"></script>
    <script>
        // Register Service Worker for PWA with auto-update
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                // Check for updates every 60 seconds (important for standalone PWA)
                setInterval(() => reg.update(), 60000);
            }).catch(() => {});
            // Auto-reload when new SW takes over
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }
        // Capture install prompt for later use
        window.__pwaInstallPrompt = null;
        window.__pwaInstalled = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__pwaInstallPrompt = e;
        });
        window.addEventListener('appinstalled', () => {
            window.__pwaInstalled = true;
            window.__pwaInstallPrompt = null;
        });
    </script>
</body>
